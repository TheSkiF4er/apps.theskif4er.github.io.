<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHA-256 Password Helper</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #10151c; color: #f2f5f7; }
    .card { max-width: 720px; margin: 0 auto; padding: 24px; border-radius: 18px; background: #18212b; border: 1px solid rgba(255,255,255,0.1); }
    input, textarea, button { width: 100%; box-sizing: border-box; margin-top: 10px; padding: 12px 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.18); background: #0f1720; color: #f2f5f7; font: inherit; }
    button { cursor: pointer; background: #d32f2f; border: none; font-weight: 700; }
    code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Генератор SHA-256 для пароля</h1>
    <p>Введите новый пароль, нажмите кнопку и вставьте результат в Supabase:</p>
    <p><code>update page_access set password_hash = 'ВАШ_ХЕШ' where id = 1;</code></p>
    <input id="password" type="text" placeholder="Новый пароль" />
    <button id="make-hash" type="button">Сгенерировать хеш</button>
    <textarea id="result" rows="4" readonly placeholder="Здесь появится SHA-256"></textarea>
  </div>

  <script>
    async function sha256(text) {
      const bytes = new TextEncoder().encode(text);
      const digest = await crypto.subtle.digest('SHA-256', bytes);
      return [...new Uint8Array(digest)].map((byte) => byte.toString(16).padStart(2, '0')).join('');
    }

    document.getElementById('make-hash').addEventListener('click', async () => {
      const value = document.getElementById('password').value.trim();
      document.getElementById('result').value = value ? await sha256(value) : '';
    });
  </script>
</body>
</html>
